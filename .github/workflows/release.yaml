name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest version matches tag
        run: |
          VERSION=$(jq -r .version custom_components/enchufado/manifest.json)
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Manifest version ($VERSION) does not match tag ($TAG)"
            exit 1
          fi
